model:
  provider: openrouter
  default: moonshotai/kimi-k2.6
fallback_model:
  provider: custom
  model: qwen3.5:9b
  base_url: http://localhost:11434/v1
  context_length: 131072
terminal:
  backend: local
  cwd: .
  timeout: 180
  lifetime_seconds: 300
  env_passthrough:
    - ANTHROPIC_API_KEY
    - OPENAI_API_KEY
container_cpu: 1
container_memory: 5120
container_disk: 51200
container_persistent: true
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 10000
  user_char_limit: 5000
  nudge_interval: 10
  flush_min_turns: 6
skills:
  creation_nudge_interval: 15
  external_dirs:
    - /Users/jazz-ai/Projects/hermes-setup/scripts/addons
agent:
  max_turns: 120
  max_tool_rounds: 200
  reasoning_effort: medium
  api_max_retries: 3
display:
  compact: false
  tool_progress: all
  streaming: true
platforms:
  whatsapp:
    enabled: true
    mode: self-chat
    dm_policy: allowlist
  telegram:
    enabled: true
    dm_policy: allowlist
  bluebubbles:
    enabled: true
platform_toolsets:
  cli:
    - hermes-cli
    - vision
    - image_gen
    - tts
    - browser
    - browser-cdp
    - code_execution
    - delegation
    - cronjob
    - skills
    - memory
    - session_search
    - moa
    - messaging
image_gen:
  provider: mlx
  model: runwayml/stable-diffusion-v1-5
stt:
  enabled: true
  provider: local
  local:
    model: base
tts:
  provider: edge
code_execution:
  timeout: 300
  max_tool_calls: 50
delegation:
  max_iterations: 100
  max_concurrency: 5
cron:
  enabled: true
approvals:
  mode: smart
  timeout: 60
onboarding:
  seen:
    busy_input_prompt: true
browser:
  cdp_url: http://127.0.0.1:9222
mcp_servers:
  filesystem:
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "/Users/jazz-ai/Projects"
      - "/Users/jazz-ai/Desktop"
    enabled: true
  fetch:
    command: npx
    args:
      - "-y"
      - "@mcp-docs/server-fetch"
    enabled: false
