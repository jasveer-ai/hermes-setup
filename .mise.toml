[settings]
experimental = true

[tasks]

# ── Tool versions (installs anything in [tools]) ─
[tasks."tools:install"]
description = "Install tool versions from [tools]"
run = "mise install"

# ── Ollama ───────────────────────────────────
[tasks.ollama]
description = "Install and start Ollama with gemma4:e4b"
run = "./scripts/ollama.sh"

# ── Default: full setup ──────────────────────
[tasks.default]
description = "Full setup — system, terminal, hermes, config, cron, ollama"
depends = ["tools:install", "system", "terminal", "hermes:install", "config:deploy", "cron:install", "ollama", "power"]

# ── Terminal ─────────────────────────────────
[tasks.terminal]
description = "Setup modern terminal (WezTerm, Starship, fzf, zsh plugins)"
run = "./scripts/terminal.sh"

# ── Power ────────────────────────────────────
[tasks.power]
description = "Disable sleep for 24/7 agent operation (needs sudo)"
run = "./scripts/power-settings.sh"

# ── System prerequisites ──────────────────────
[tasks.system]
description = "System prerequisites (git, ssh, github, tools)"
run = "./scripts/system.sh"

# ── Hermes ───────────────────────────────────
[tasks."hermes:install"]
description = "Install Hermes Agent"
run = "./scripts/hermes-install.sh"

# ── Config ───────────────────────────────────
[tasks."config:deploy"]
description = "Deploy config files to ~/.hermes/"
run = "./scripts/deploy-config.sh"

# ── Cron ──────────────────────────────────────
[tasks."cron:install"]
description = "Install daily memory compaction cron (3am)"
run = "./scripts/cron-install.sh"

[tasks."cron:run"]
description = "Run memory compaction manually"
run = "./cron/memory-update.sh"

[tasks."cron:logs"]
description = "View cron logs"
run = "cat ~/.hermes/logs/cron-memory.log 2>/dev/null || echo 'No logs yet'"

# ── Addons: unlock Hermes full potential ──────
[tasks."addons:all"]
description = "Run all addons — web, browser, voice, toolsets, opencode"
depends = ["addons:web-search", "addons:browser", "addons:voice", "addons:enable-all", "addons:opencode"]

[tasks."addons:web-search"]
description = "Free DuckDuckGo web search (no API key)"
run = "./scripts/addons/web-search.sh"

[tasks."addons:browser"]
description = "Playwright browser automation (screenshots, extract, PDF)"
run = "./scripts/addons/browser.sh"

[tasks."addons:voice"]
description = "Free TTS via Edge (no API key)"
run = "./scripts/addons/voice.sh"

[tasks."addons:image-gen"]
description = "Local image gen via MLX or ComfyUI"
run = "./scripts/addons/image-gen.sh"

[tasks."addons:mcp"]
description = "MCP server integrations (GitHub, filesystem, fetch)"
run = "./scripts/addons/mcp-servers.sh"

[tasks."addons:opencode"]
description = "OpenCode headless server + session management"
run = "./scripts/addons/opencode.sh"

[tasks."addons:enable-all"]
description = "Enable all Hermes toolsets and max settings"
run = "./scripts/addons/enable-all.sh""
