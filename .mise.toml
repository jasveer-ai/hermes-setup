[env]
HERMES_HOME = "~/.hermes"

[settings]
experimental = true

[tasks]

# ── Tool versions (installs anything in [tools]) ─
[tasks."tools:install"]
description = "Install tool versions from [tools]"
run = "mise install"

# ── Default: full setup ──────────────────────
[tasks.default]
description = "Full setup — system, terminal, hermes, config, cron"
depends = ["tools:install", "system", "terminal", "hermes:install", "config:deploy", "cron:install", "power"]

# ── Terminal ─────────────────────────────────
[tasks.terminal]
description = "Setup modern terminal (WezTerm, Starship, fzf, zsh plugins)"
run = "./scripts/terminal.sh"

# ── Power ────────────────────────────────────
[tasks.power]
description = "Disable sleep for 24/7 agent operation (needs sudo)"
run = "./scripts/power-settings.sh"

# ── System prerequisites ──────────────────────
[tasks.system]
description = "System prerequisites (git, ssh, github, tools)"
run = "./scripts/system.sh"

# ── Hermes ───────────────────────────────────
[tasks."hermes:install"]
description = "Install Hermes Agent"
run = "./scripts/hermes-install.sh"

# ── Config ───────────────────────────────────
[tasks."config:deploy"]
description = "Deploy config files to ~/.hermes/"
run = "./scripts/deploy-config.sh"

# ── Cron ──────────────────────────────────────
[tasks."cron:install"]
description = "Install daily memory compaction cron (3am)"
run = "./scripts/cron-install.sh"

[tasks."cron:run"]
description = "Run memory compaction manually"
run = "./cron/memory-update.sh"

[tasks."cron:logs"]
description = "View cron logs"
run = "cat ~/.hermes/logs/cron-memory.log 2>/dev/null || echo 'No logs yet'"
